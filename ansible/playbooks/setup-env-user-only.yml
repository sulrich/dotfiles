---
# setup-environment-user-only.yml - ansible playbook to bootstrap a user environment
# without requiring root/sudo access on the target host
#
# individual tools can be installed/updated on their own via tags, e.g.:
#   ansible-playbook setup-env-user-only.yml --tags go
#   ansible-playbook setup-env-user-only.yml --tags nvim,rust
# available tool tags: go nvim rust tree-sitter gws acli op gh node python claude lsp
# list all tags with: ansible-playbook setup-env-user-only.yml --list-tags

- name: bootstrap user environment (no root required)
  hosts: all
  vars:
    go_os: "{{ ansible_system | lower }}"
    go_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ('arm64' if ansible_architecture == 'aarch64' else ('386' if ansible_architecture in ['i386', 'i686'] else ansible_architecture)) }}"
    python2_ver: "2.7.18"
    python3_ver: "3.13"
    home_dir: "{{ ansible_env.HOME }}"
    nvim_version: "0.12.4"
    op_version: "2.30.0"  # 1password cli - bump to upgrade
    install_lsps: false  # default to not installing LSPs
    dotfiles_map:
      - {src: "ansible.cfg", dest: ".ansible.cfg"}
      - {src: "cloginrc", dest: ".cloginrc"}
      - {src: "digrc", dest: ".digrc"}
      - {src: "flake8", dest: ".flake8"}
      - {src: "git/gitconfig", dest: ".gitconfig"}
      - {src: "git/gitconfig-personal", dest: ".gitconfig-personal"}
      - {src: "git/gitignore", dest: ".gitignore"}
      - {src: "mailcap", dest: ".mailcap"}
      - {src: "markdownlint.json", dest: ".markdownlintrc"}
      - {src: "ruff.toml", dest: ".ruff.toml"}
      - {src: "screenrc", dest: ".screenrc"}
      - {src: "sqliterc", dest: ".sqliterc"}
      - {src: "templates", dest: ".templates"}
      - {src: "tmux.conf", dest: ".tmux.conf"}
      - {src: "urlview", dest: ".urlview"}
      - {src: "vale.ini", dest: ".vale.ini"}
      - {src: "zshrc", dest: ".zshrc"}
      - {src: "zsh/zlogin", dest: ".zlogin"}
      - {src: "zsh/zshenv", dest: ".zshenv"}
      - {src: "ssh/config", dest: ".ssh/config"}
    pub_keys:
      - {name: "nh", url: "https://github.com/sulrich-nexthop.keys"}
      - {name: "github", url: "https://github.com/sulrich.keys"}
      - {name: "botwerks", url: "https://botwerks.net/sulrich.keys"}
    git_repos:
      - {repo: "https://github.com/sulrich/xdg-config-home.git", dest: "{{ home_dir }}/src/personal/config", ssh_url: "github-sulrich:/sulrich/xdg-config-home.git"}
      - {repo: "https://github.com/sulrich/nvim.git", dest: "{{ home_dir }}/.config/nvim", ssh_url: "github-sulrich:/sulrich/nvim.git"}
      - {repo: "https://github.com/sulrich/home-bin.git", dest: "{{ home_dir }}/src/personal/bin", ssh_url: "github-sulrich:/sulrich/home-bin.git"}
      - {repo: "https://github.com/tmux-plugins/tpm", dest: "{{ home_dir }}/.tmux/plugins/tpm", ssh_url: "github-sulrich:/tmux-plugins/tpm"}
  tasks:
    - name: detect os family
      set_fact:
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        is_redhat: "{{ ansible_os_family == 'RedHat' }}"
        is_macos: "{{ ansible_os_family == 'Darwin' }}"

    - name: create basic directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0755
      loop:
        - "{{ home_dir }}/.ssh"
        - "{{ home_dir }}/.ssh/tmp"
        - "{{ home_dir }}/.credentials"
        - "{{ home_dir }}/.local/share"
        - "{{ home_dir }}/.local/bin"
        - "{{ home_dir }}/go/bin"
        - "{{ home_dir }}/go/src"
        - "{{ home_dir }}/go/pkg"
        - "{{ home_dir }}/src/personal"

    # secure the credentials directory
    - name: set permissions on credentials directory
      file:
        path: "{{ home_dir }}/.credentials"
        mode: 0700

    - name: check if dotfiles repository exists
      stat:
        path: "{{ home_dir }}/src/personal/dotfiles/.git"
      register: dotfiles_stat

    # adjust this to your actual dotfiles repo URL
    - name: clone dotfiles repository if not exists
      git:
        repo: "https://github.com/sulrich/dotfiles.git"
        dest: "{{ home_dir }}/src/personal/dotfiles"
        clone: true
      register: dotfiles_clone
      when: not dotfiles_stat.stat.exists

    # skip pull for existing dotfiles repository - just check presence
    - name: register dotfiles repository exists
      set_fact:
        dotfiles_exists: true
      when: dotfiles_stat.stat.exists

    - name: update dotfiles repository remote URL for new clone only
      shell: |
        cd {{ home_dir }}/src/personal/dotfiles
        git remote set-url origin github-sulrich:/sulrich/dotfiles.git
      when: dotfiles_clone is defined and dotfiles_clone.changed

    - name: create .home symlink to dotfiles
      file:
        src: "{{ home_dir }}/src/personal/dotfiles"
        dest: "{{ home_dir }}/.home"
        state: link

    # keep the xdg config tree under ~/src/personal/config and expose it at the
    # conventional ~/.config location via symlink. this must exist before the
    # git repos clone so nvim lands under ~/.config/nvim (i.e. the config repo).
    - name: create .config symlink to ~/src/personal/config
      file:
        src: "{{ home_dir }}/src/personal/config"
        dest: "{{ home_dir }}/.config"
        state: link

    - name: check if git repos exist
      stat:
        path: "{{ item.dest }}/.git"
      loop: "{{ git_repos }}"
      register: git_repos_stat

    - name: clone git repos if not exist
      git:
        repo: "{{ item.item.repo }}"
        dest: "{{ item.item.dest }}"
        clone: true
      loop: "{{ git_repos_stat.results }}"
      when: not item.stat.exists
      register: git_clone_results
      loop_control:
        label: "{{ item.item.dest }}"

    # Skip pull for existing git repos - just check presence
    - name: register git repos exist
      debug:
        msg: "Repository exists at {{ item.item.dest }}"
      loop: "{{ git_repos_stat.results }}"
      when: item.stat.exists
      loop_control:
        label: "{{ item.item.dest }}"

    # Skip git remote updates entirely
    # This avoids any SSH agent dependency for subsequent runs
    - name: check for newly cloned git repos
      set_fact:
        any_repos_cloned: "{{ git_clone_results.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | list | length > 0 }}"
      when: git_clone_results is defined

    - name: update git remote URLs for newly cloned repos only
      shell: |
        cd {{ item.item.item.dest }}
        git remote set-url origin {{ item.item.item.ssh_url }}
      loop: "{{ git_clone_results.results | default([]) }}"
      when:
        - git_clone_results is defined
        - item.changed | default(false)
      loop_control:
        label: "{{ item.item.item.dest | default('unknown') }}"

    - name: check if fzf exists
      stat:
        path: "{{ home_dir }}/.fzf/.git"
      register: fzf_stat

    - name: install fzf if not exists
      git:
        repo: https://github.com/junegunn/fzf.git
        dest: "{{ home_dir }}/.fzf"
        depth: 1
      register: fzf_clone
      when: not fzf_stat.stat.exists

    # Skip pull for existing fzf - just check presence
    - name: register fzf exists
      set_fact:
        fzf_exists: true
      when: fzf_stat.stat.exists

    - name: install fzf binaries
      shell: "{{ home_dir }}/.fzf/install --all"
      when: fzf_clone is defined and fzf_clone.changed

    - name: create ssh symlink for platform
      file:
        src: "{{ home_dir }}/.home/ssh/{{ ansible_system | lower }}"
        dest: "{{ home_dir }}/.ssh/conf.d"
        state: link

    - name: set ssh directory permissions
      file:
        path: "{{ home_dir }}/.home/ssh"
        mode: 0755
        recurse: true

    - name: check for existing zshrc file
      stat:
        path: "{{ home_dir }}/.zshrc"
      register: zshrc_file

    - name: backup existing zshrc file if it exists
      copy:
        src: "{{ home_dir }}/.zshrc"
        dest: "{{ home_dir }}/.zshrc.bak"
        remote_src: true
      when: zshrc_file.stat.exists and zshrc_file.stat.islnk == false

    - name: remove existing zshrc file
      file:
        path: "{{ home_dir }}/.zshrc"
        state: absent
      when: zshrc_file.stat.exists and zshrc_file.stat.islnk == false

    - name: create dotfile symlinks
      file:
        src: "{{ home_dir }}/.home/{{ item.src }}"
        dest: "{{ home_dir }}/{{ item.dest }}"
        state: link
      loop: "{{ dotfiles_map }}"

    - name: check if go is already installed locally
      stat:
        path: "{{ home_dir }}/.local/go/bin/go"
      register: go_binary
      tags: [go]

    - name: get installed go version
      shell: |
        {{ home_dir }}/.local/go/bin/go version | awk '{print $3}'
      register: go_installed_version_result
      changed_when: false
      failed_when: false
      when: go_binary.stat.exists
      tags: [go]

    - name: get latest go version
      shell: |
        curl -s https://go.dev/VERSION?m=text | head -1
      register: go_latest_version_result
      changed_when: false
      tags: [go]

    - name: set go version facts
      set_fact:
        go_latest_version: "{{ go_latest_version_result.stdout | trim }}"
        go_installed_version: "{{ go_installed_version_result.stdout | default('') | trim }}"
      tags: [go]

    - name: install or update go
      block:
        - name: download go
          get_url:
            url: "https://dl.google.com/go/{{ go_latest_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
            dest: "/tmp/{{ go_latest_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"

        - name: remove existing go installation
          file:
            path: "{{ home_dir }}/.local/go"
            state: absent
          when: go_binary.stat.exists

        - name: create local go directory
          file:
            path: "{{ home_dir }}/.local/go"
            state: directory
            mode: 0755

        - name: extract go
          unarchive:
            src: "/tmp/{{ go_latest_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
            dest: "{{ home_dir }}/.local"
            remote_src: true

        - name: cleanup go tarball
          file:
            path: "/tmp/{{ go_latest_version }}.{{ go_os }}-{{ go_arch }}.tar.gz"
            state: absent
      when: not go_binary.stat.exists or go_installed_version != go_latest_version
      tags: [go]

    - name: sync public ssh keys
      block:
        - name: download public keys
          get_url:
            url: "{{ item.url }}"
            dest: "/tmp/{{ item.name }}.keys"
          loop: "{{ pub_keys }}"

        - name: concat keys to authorized_keys
          shell: cat /tmp/{{ item.name }}.keys >> {{ home_dir }}/.ssh/authorized_keys
          loop: "{{ pub_keys }}"

        - name: remove duplicate keys
          shell: sort -u {{ home_dir }}/.ssh/authorized_keys > /tmp/auth_keys_uniq && mv /tmp/auth_keys_uniq {{ home_dir }}/.ssh/authorized_keys

        - name: set authorized_keys permissions
          file:
            path: "{{ home_dir }}/.ssh/authorized_keys"
            mode: 0755

        - name: cleanup temp key files
          file:
            path: "/tmp/{{ item.name }}.keys"
            state: absent
          loop: "{{ pub_keys }}"

    - name: copy specific ssh public keys from controller
      copy:
        src: "{{ lookup('env', 'HOME') }}/.ssh/{{ item }}"
        dest: "{{ home_dir }}/.ssh/{{ item }}"
        mode: 0600
      loop:
        - "sulrich-botwerks.pub"
        - "sulrich-nexthop.pub"
        # - "sulrich-blink.pub"

    - name: check if uv is installed
      stat:
        path: "{{ home_dir }}/.local/bin/uv"
      register: uv_binary
      tags: [python]

    - name: install uv python package manager
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ home_dir }}/.local/bin/uv"
      when: not uv_binary.stat.exists
      tags: [python]

    - name: check if python3 is installed via uv
      stat:
        path: "{{ home_dir }}/.uv/pythons/{{ python3_ver }}"
      register: uv_python3
      tags: [python]

    - name: install python3 using uv
      shell: |
        {{ home_dir }}/.local/bin/uv python install {{ python3_ver }}
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.uv/pythons/{{ python3_ver }}"
      when: not uv_python3.stat.exists
      tags: [python]

    - name: check if ruff is installed
      stat:
        path: "{{ home_dir }}/.local/bin/ruff"
      register: ruff_binary
      tags: [python]

    - name: install ruff using uv
      shell: |
        {{ home_dir }}/.local/bin/uv tool install ruff
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.local/bin/ruff"
      when: not ruff_binary.stat.exists
      tags: [python]

    - name: check if ty is installed
      stat:
        path: "{{ home_dir }}/.local/bin/ty"
      register: ty_binary
      tags: [python]

    - name: install ty using uv
      shell: |
        {{ home_dir }}/.local/bin/uv tool install ty
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.local/bin/ty"
      when: not ty_binary.stat.exists
      tags: [python]

    - name: check if 1password cli is installed
      stat:
        path: "{{ home_dir }}/.local/bin/op"
      register: op_binary
      tags: [op]

    - name: get installed 1password cli version
      shell: |
        {{ home_dir }}/.local/bin/op --version
      register: op_installed_version_result
      changed_when: false
      failed_when: false
      when: op_binary.stat.exists
      tags: [op]

    - name: set 1password cli version fact
      set_fact:
        op_installed_version: "{{ op_installed_version_result.stdout | default('') | trim }}"
      tags: [op]

    - name: set 1password cli architecture
      set_fact:
        op_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else '386' if ansible_architecture in ['i386', 'i686']
             else ansible_architecture }}
      tags: [op]

    - name: install or update 1password cli
      block:
        - name: download 1password cli
          get_url:
            url: "https://cache.agilebits.com/dist/1P/op2/pkg/v{{ op_version }}/op_linux_{{ op_arch }}_v{{ op_version }}.zip"
            dest: "/tmp/op_linux_{{ op_arch }}.zip"
            mode: 0644

        - name: extract 1password cli
          unarchive:
            src: "/tmp/op_linux_{{ op_arch }}.zip"
            dest: "{{ home_dir }}/.local/bin"
            remote_src: true
            mode: 0755

        - name: cleanup 1password cli zip
          file:
            path: "/tmp/op_linux_{{ op_arch }}.zip"
            state: absent
      when: not op_binary.stat.exists or op_installed_version != op_version
      tags: [op]

    - name: check if github cli is installed
      stat:
        path: "{{ home_dir }}/.local/bin/gh"
      register: gh_binary
      tags: [gh]

    - name: get installed github cli version
      shell: |
        {{ home_dir }}/.local/bin/gh --version | head -1 | awk '{print $3}'
      register: gh_installed_version_result
      changed_when: false
      failed_when: false
      when: gh_binary.stat.exists
      tags: [gh]

    - name: get latest github cli version
      shell: |
        curl -sL -o /dev/null -w '%{url_effective}' https://github.com/cli/cli/releases/latest | sed 's|.*/v||'
      register: gh_latest_version_result
      changed_when: false
      failed_when: gh_latest_version_result.stdout | length == 0
      tags: [gh]

    - name: set github cli version facts
      set_fact:
        gh_latest_version: "{{ gh_latest_version_result.stdout }}"
        gh_installed_version: "{{ gh_installed_version_result.stdout | default('') }}"
      tags: [gh]

    - name: set github cli architecture
      set_fact:
        gh_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else '386' if ansible_architecture in ['i386', 'i686']
             else ansible_architecture }}
      tags: [gh]

    - name: install or update github cli
      block:
        - name: download github cli
          get_url:
            url: "https://github.com/cli/cli/releases/download/v{{ gh_latest_version }}/gh_{{ gh_latest_version }}_linux_{{ gh_arch }}.tar.gz"
            dest: "/tmp/gh_linux_{{ gh_arch }}.tar.gz"
            mode: 0644

        - name: create temp extraction directory
          file:
            path: "/tmp/gh_extract"
            state: directory
            mode: 0755

        - name: extract github cli
          unarchive:
            src: "/tmp/gh_linux_{{ gh_arch }}.tar.gz"
            dest: "/tmp/gh_extract"
            remote_src: true

        - name: copy gh binary to local bin
          copy:
            src: "/tmp/gh_extract/gh_{{ gh_latest_version }}_linux_{{ gh_arch }}/bin/gh"
            dest: "{{ home_dir }}/.local/bin/gh"
            mode: 0755
            remote_src: true

        - name: cleanup github cli files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - "/tmp/gh_linux_{{ gh_arch }}.tar.gz"
            - "/tmp/gh_extract"
      when: not gh_binary.stat.exists or gh_installed_version != gh_latest_version
      tags: [gh]

    - name: set acli architecture
      set_fact:
        acli_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else ansible_architecture }}
      when: ansible_system == 'Linux'
      tags: [acli]

    # acli - atlassian cli. the download URL always resolves to the latest
    # release, so force:true re-fetches each run and only reports changed when
    # the binary actually differs - this keeps it fresh like our pinned neovim.
    - name: install or update acli
      get_url:
        url: "https://acli.atlassian.com/linux/latest/acli_linux_{{ acli_arch }}/acli"
        dest: "{{ home_dir }}/.local/bin/acli"
        mode: 0755
        force: true
      when: ansible_system == 'Linux'
      tags: [acli]

    # rust/cargo must be installed before neovim so cargo-based tooling
    # (tree-sitter-cli) is available for neovim's treesitter setup.
    - name: check if cargo is already installed
      stat:
        path: "{{ home_dir }}/.cargo/bin/cargo"
      register: cargo_binary
      tags: [rust]

    - name: install rust toolchain via rustup
      shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      args:
        creates: "{{ home_dir }}/.cargo/bin/cargo"
        executable: /bin/bash
      when: not cargo_binary.stat.exists
      tags: [rust]

    - name: update rust toolchain to latest stable
      shell: |
        {{ home_dir }}/.cargo/bin/rustup update stable
      args:
        executable: /bin/bash
      when: cargo_binary.stat.exists
      changed_when: false
      tags: [rust]

    # tree-sitter-cli is installed via cargo before neovim so neovim's
    # treesitter tooling can build and manage parsers.
    - name: check if tree-sitter-cli is installed
      stat:
        path: "{{ home_dir }}/.cargo/bin/tree-sitter"
      register: tree_sitter_binary
      tags: [rust, tree-sitter]

    - name: install tree-sitter-cli via cargo
      shell: |
        {{ home_dir }}/.cargo/bin/cargo install tree-sitter-cli
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.cargo/bin/tree-sitter"
      when: not tree_sitter_binary.stat.exists
      tags: [rust, tree-sitter]

    # gws - google workspace cli, installed from git via cargo
    - name: check if gws is installed
      stat:
        path: "{{ home_dir }}/.cargo/bin/gws"
      register: gws_binary
      tags: [gws]

    - name: install gws via cargo
      shell: |
        {{ home_dir }}/.cargo/bin/cargo install --git https://github.com/googleworkspace/cli --locked
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.cargo/bin/gws"
      when: not gws_binary.stat.exists
      tags: [gws]

    - name: check if neovim exists
      stat:
        path: "{{ home_dir }}/.local/bin/nvim"
      register: nvim_binary
      tags: [nvim]

    - name: get installed neovim version
      shell: |
        {{ home_dir }}/.local/bin/nvim --version | head -1 | awk '{print $2}' | sed 's/^v//'
      register: nvim_installed_version_result
      changed_when: false
      failed_when: false
      when: nvim_binary.stat.exists
      tags: [nvim]

    - name: set neovim version fact
      set_fact:
        nvim_installed_version: "{{ nvim_installed_version_result.stdout | default('') | trim }}"
      tags: [nvim]

    - name: set architecture for neovim appimage
      set_fact:
        nvim_arch: >-
          {{ 'x86_64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else ansible_architecture }}
      when: ansible_system == 'Linux'
      tags: [nvim]

    - name: install or update neovim appimage
      block:
        - name: download neovim appimage directly to local bin
          get_url:
            url: "https://github.com/neovim/neovim/releases/download/v{{ nvim_version }}/nvim-linux-{{ nvim_arch }}.appimage"
            dest: "{{ home_dir }}/.local/bin/nvim.appimage"
            mode: 0755
            force: true

        - name: create symbolic link for nvim
          file:
            src: "{{ home_dir }}/.local/bin/nvim.appimage"
            dest: "{{ home_dir }}/.local/bin/nvim"
            state: link
      when:
        - ansible_system == 'Linux'
        - not nvim_binary.stat.exists or nvim_installed_version != nvim_version
      tags: [nvim]

    - name: check if neovim python venv exists
      stat:
        path: "{{ home_dir }}/.config/nvim/.venv"
      register: nvim_venv
      tags: [nvim]

    - name: set up neovim python environment with uv
      block:
        - name: create neovim python venv
          shell: |
            cd {{ home_dir }}/.config/nvim
            {{ home_dir }}/.local/bin/uv venv
          args:
            creates: "{{ home_dir }}/.config/nvim/.venv"

        - name: install neovim python dependencies
          shell: |
            cd {{ home_dir }}/.config/nvim
            source .venv/bin/activate
            {{ home_dir }}/.local/bin/uv pip install neovim pynvim
            {{ home_dir }}/.local/bin/uv pip install ruff basedpyright
          args:
            executable: /bin/bash
      when: not nvim_venv.stat.exists
      tags: [nvim]

    - name: check if gopls is installed
      shell: |
        export PATH="{{ home_dir }}/.local/go/bin:$PATH:{{ home_dir }}/go/bin"
        which gopls
      args:
        executable: /bin/bash
      register: gopls_check
      ignore_errors: true
      changed_when: false
      failed_when: false
      when: install_lsps | bool
      tags: [lsp]

    - name: install gopls
      shell: |
        export PATH="{{ home_dir }}/.local/go/bin:$PATH"
        {{ home_dir }}/.local/go/bin/go install golang.org/x/tools/gopls@latest
      args:
        executable: /bin/bash
      when:
        - install_lsps | bool
        - gopls_check.rc != 0
      ignore_errors: true
      changed_when: false
      tags: [lsp]

    - name: display LSP installation message
      debug:
        msg: "LSP tools (gopls) have been installed"
      when: install_lsps | bool
      tags: [lsp]

    # node.js / npm - install from pre-built binary so we get a modern version
    # regardless of what apt has available on the target host.
    # npm prefix is set to ~/.local so `npm install -g` works without root.
    - name: check if node is installed
      stat:
        path: "{{ home_dir }}/.local/bin/node"
      register: node_binary
      tags: [node]

    - name: get installed node version
      shell: |
        {{ home_dir }}/.local/bin/node --version | sed 's/^v//'
      register: node_installed_version_result
      changed_when: false
      failed_when: false
      when: node_binary.stat.exists
      tags: [node]

    - name: get latest node lts version
      uri:
        url: https://nodejs.org/dist/index.json
        return_content: true
      register: nodejs_versions_response
      tags: [node]

    - name: set node version facts
      set_fact:
        node_lts_version: "{{ (nodejs_versions_response.json | selectattr('lts', 'truthy') | first).version | regex_replace('^v', '') }}"
        node_installed_version: "{{ node_installed_version_result.stdout | default('') | trim }}"
      tags: [node]

    - name: set node architecture
      set_fact:
        node_arch: >-
          {{ 'x64' if ansible_architecture == 'x86_64'
             else 'arm64' if ansible_architecture == 'aarch64'
             else ansible_architecture }}
      tags: [node]

    - name: install or update node lts
      block:
        - name: download node lts tarball
          get_url:
            url: "https://nodejs.org/dist/v{{ node_lts_version }}/node-v{{ node_lts_version }}-linux-{{ node_arch }}.tar.gz"
            dest: "/tmp/node-v{{ node_lts_version }}-linux-{{ node_arch }}.tar.gz"
            mode: 0644

        - name: remove existing node installation
          file:
            path: "{{ home_dir }}/.local/nodejs"
            state: absent
          when: node_binary.stat.exists

        - name: create node installation directory
          file:
            path: "{{ home_dir }}/.local/nodejs"
            state: directory
            mode: 0755

        - name: extract node lts
          unarchive:
            src: "/tmp/node-v{{ node_lts_version }}-linux-{{ node_arch }}.tar.gz"
            dest: "{{ home_dir }}/.local/nodejs"
            remote_src: true
            extra_opts:
              - "--strip-components=1"

        - name: symlink node to local bin
          file:
            src: "{{ home_dir }}/.local/nodejs/bin/node"
            dest: "{{ home_dir }}/.local/bin/node"
            state: link
            force: true

        - name: symlink npm to local bin
          file:
            src: "{{ home_dir }}/.local/nodejs/bin/npm"
            dest: "{{ home_dir }}/.local/bin/npm"
            state: link
            force: true

        - name: symlink npx to local bin
          file:
            src: "{{ home_dir }}/.local/nodejs/bin/npx"
            dest: "{{ home_dir }}/.local/bin/npx"
            state: link
            force: true

        - name: cleanup node tarball
          file:
            path: "/tmp/node-v{{ node_lts_version }}-linux-{{ node_arch }}.tar.gz"
            state: absent
      when: not node_binary.stat.exists or node_installed_version != node_lts_version
      tags: [node]

    - name: configure npm prefix for user-local global installs
      shell: |
        {{ home_dir }}/.local/bin/npm config set prefix {{ home_dir }}/.local
      args:
        executable: /bin/bash
      changed_when: false
      tags: [node]

    - name: check if claude code is installed
      stat:
        path: "{{ home_dir }}/.local/bin/claude"
      register: claude_binary
      tags: [claude]

    - name: install claude code via native installer
      shell: curl -fsSL https://claude.ai/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ home_dir }}/.local/bin/claude"
      when: not claude_binary.stat.exists
      tags: [claude]

    - name: display setup completion message
      debug:
        msg: |
          user-only setup complete!
          remember to:
          1. start tmux and press "c-t + i" to install tmux plugins
          2. copy any needed credentials to ~/.credentials
          3. a neovim python environment has been set up with pynvim, ruff, and basedpyright installed
