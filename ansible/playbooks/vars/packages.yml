---
# package lists for ubuntu/debian systems
# this file can be imported into other playbooks as needed

# lite package list - essential tools only
packages_lite:
  - apt-transport-https
  - ca-certificates
  - curl
  - git
  - gnupg
  - htop
  - lsb-release
  - rsync
  - software-properties-common
  - ssh
  - tree
  - unzip
  - wget
  - zip

# standard package list
packages_standard:
  # essential tools (from lite list)
  - acct
  - apt-transport-https
  - bpfcc-tools
  - bpftrace
  - build-essential
  - bzip2
  - ca-certificates
  # clang ships the compiler builtin headers (stdbool.h et al) in its resource
  # dir; bindgen needs these to build cargo crates like rquickjs-sys, a
  # transitive dep of tree-sitter-cli. build-essential's gcc headers don't count.
  - clang
  - cmake
  - curl
  - direnv
  - bind9-dnsutils
  - ethtool
  - fzf
  - gdb
  - git
  - gnupg
  - htop
  - iftop
  - iproute2
  - iputils-ping
  - jq
  - llvm
  - lsb-release
  - lsof
  - make
  - net-tools
  - nmap
  - numactl
  - p7zip-full
  - procps
  - psmisc
  - ripgrep
  - software-properties-common
  - ssh
  - sshpass
  - sysstat
  - tcpdump
  - telnet
  - tmux
  - trace-cmd
  - traceroute
  - tree
  - unrar
  - unzip
  - util-linux
  - wget
  - whois
  - xz-utils
  - yq
  - zip
  - zlib1g-dev
  - zsh
